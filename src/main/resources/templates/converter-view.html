<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<ul>
    <li>${number}: <span th:text="${number}" ></span></li> <!-- 타임리프는 일단 기본적으로 숫자->문자열 전환 컨버터를 내장하고 있다.  -->
    <li>${{number}}: <span th:text="${{number}}" ></span></li> <!-- 중괄호가 2개 있으면 컨버터/포매터를 사용한다는 뜻임. 우선순위에 위해 타임리프 내장의 컨버터가 아닌 IntegerToString 컨버터가 사용된다. -->
    <li>${ipPort}: <span th:text="${ipPort}" ></span></li> <!-- 객체의 경우 컨터버를 적용하지 않으면 toString()이 호출 왜냐하면 템플릿 출력은 문자열이기 때문이다-->
    <li>${{ipPort}}: <span th:text="${{ipPort}}" ></span></li> <!-- 중괄호가 2개 있으면 컨버터/포매터를 사용한다는 뜻임 -->
</ul>
</body>
</html>
